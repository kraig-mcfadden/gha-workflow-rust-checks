name: Rust Checks

on:
  workflow_call:
    inputs:
      change-risk-threshold:
        description: 'CRAP score above which a function is flagged'
        required: false
        type: string
        default: '30'
      change-risk-fail-above:
        description: 'Fail the change-risk job if any function exceeds the threshold'
        required: false
        type: string
        default: 'false'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check
        run: cargo check
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Test
        run: cargo test
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
  fmt_check:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Formatting
        run: cargo fmt --check
  change_risk:
    name: Change Risk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Change Risk Score
        uses: kraigmcfadden/gha-actions-change-risk-score/change-risk-score-rs@main
        with:
          threshold: ${{ inputs.change-risk-threshold }}
          fail-above: ${{ inputs.change-risk-fail-above }}
          post-pr-comment: 'true'
